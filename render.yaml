# Render blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: prince-esquare-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: REQUIRE_CLOUDINARY
        value: true
      - key: STORAGE_ALLOW_LOCAL
        value: false
      - key: TRUST_PROXY
        value: true
      - key: AUTO_BOOTSTRAP
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: prince-esquare-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_KEY
        generateValue: true
      - key: CLOUDINARY_URL
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: prince-esquare-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: prince-esquare-db
    plan: starter
    databaseName: prince_esquare
    user: prince_esquare
