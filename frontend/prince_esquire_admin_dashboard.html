
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.shell{display:flex;height:820px;background:var(--color-background-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;border:0.5px solid var(--color-border-tertiary)}

/* sidebar */
.sidebar{width:220px;min-width:220px;background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;overflow:hidden}
.sidebar-logo{padding:20px 16px 16px;border-bottom:0.5px solid var(--color-border-tertiary)}
.logo-mark{display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;background:#1a1a1a;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:500}
.logo-text{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.logo-sub{font-size:11px;color:var(--color-text-secondary)}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.nav-section-label{font-size:10px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:0.06em;text-transform:uppercase;padding:10px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;color:var(--color-text-secondary);transition:all 0.15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.nav-item.active{background:#1a1a1a;color:#fff}
.nav-item.active i{color:#fff}
.nav-item i{font-size:16px;color:var(--color-text-tertiary);flex-shrink:0}
.nav-item.active i{color:#fff}
.nav-badge{margin-left:auto;background:var(--color-background-danger);color:var(--color-text-danger);font-size:10px;font-weight:500;padding:1px 6px;border-radius:20px}
.sidebar-footer{padding:12px 8px;border-top:0.5px solid var(--color-border-tertiary)}

/* main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:8px}
.page-title{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.breadcrumb{font-size:12px;color:var(--color-text-secondary)}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-icon{width:32px;height:32px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--color-text-secondary);font-size:16px}
.avatar{width:32px;height:32px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#fff;cursor:pointer}

/* content area */
.content{flex:1;overflow-y:auto;padding:24px}

/* stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:16px}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.stat-value{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.stat-change{font-size:11px;margin-top:4px}
.stat-change.up{color:var(--color-text-success)}
.stat-change.down{color:var(--color-text-danger)}

/* section header */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.btn-sm{font-size:12px;padding:5px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;display:flex;align-items:center;gap:5px}

/* table */
.table-wrap{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);overflow:hidden;margin-bottom:24px}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{padding:10px 14px;text-align:left;font-size:11px;font-weight:500;color:var(--color-text-secondary);background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);letter-spacing:0.03em;text-transform:uppercase}
.data-table td{padding:11px 14px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--color-background-secondary)}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-success{background:var(--color-background-success);color:var(--color-text-success)}
.badge-warning{background:var(--color-background-warning);color:var(--color-text-warning)}
.badge-danger{background:var(--color-background-danger);color:var(--color-text-danger)}
.badge-info{background:var(--color-background-info);color:var(--color-text-info)}
.badge-neutral{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.cell-user{display:flex;align-items:center;gap:10px}
.cell-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.action-btn{width:28px;height:28px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--color-text-secondary);font-size:14px;margin-left:4px}

/* two-col layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.panel{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);overflow:hidden}
.panel-header{padding:14px 16px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between}
.panel-body{padding:12px 0}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;font-size:13px}
.list-item:hover{background:var(--color-background-secondary)}
.list-left{display:flex;align-items:center;gap:10px}
.list-rank{font-size:11px;font-weight:500;color:var(--color-text-tertiary);width:16px;text-align:center}
.progress-bar-bg{width:80px;height:4px;background:var(--color-background-secondary);border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:2px;background:#1a1a1a}

/* search bar */
.search-bar{display:flex;align-items:center;gap:8px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:6px 10px;margin-bottom:16px;font-size:13px;color:var(--color-text-secondary)}
.search-bar input{background:none;border:none;outline:none;font-size:13px;color:var(--color-text-primary);flex:1;font-family:var(--font-sans)}
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-chip{font-size:12px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer}
.filter-chip.active-chip{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

/* mini chart bars */
.mini-chart{display:flex;align-items:flex-end;gap:3px;height:40px;padding:0 16px 12px}
.mini-bar{flex:1;background:#1a1a1a;border-radius:2px 2px 0 0;opacity:0.15;min-height:4px}
.mini-bar.hi{opacity:0.9}
.mini-bar.mid{opacity:0.55}
</style>

<script>

function showSection(key, btn) {
  if(!sections[key]) return;
  document.getElementById('content-area').innerHTML = sections[key].render();
  document.getElementById('page-title').textContent = sections[key].title;
  document.getElementById('breadcrumb').textContent = 'Admin /';
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.remove('active');
    el.removeAttribute('aria-current');
  });
  if(btn){btn.classList.add('active');btn.setAttribute('aria-current','page');}
  else{
    document.querySelectorAll('.nav-item').forEach(el=>{
      if(el.textContent.trim().startsWith(sections[key].title)||el.getAttribute('onclick')===`showSection('${key}',this)`){
        el.classList.add('active');el.setAttribute('aria-current','page');
      }
    });
  }
}

function filterChip(el){
  el.closest('.filter-row').querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active-chip'));
  el.classList.add('active-chip');
}

showSection('dashboard', document.querySelector('.nav-item.active'));
</script>
